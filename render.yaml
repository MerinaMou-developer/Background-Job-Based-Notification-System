# Optional: Render Blueprint — New → Blueprint → connect repo with render.yaml
# Free tier: web may sleep; worker + DB + Redis may need paid plans on some accounts.

services:
  - type: web
    name: notification-api
    runtime: docker
    plan: free
    healthCheckPath: /admin/login/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: notification-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: notification-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: notification-redis
          property: connectionString
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: EMAIL_FROM
        sync: false

  - type: worker
    name: notification-celery
    runtime: docker
    plan: free
    dockerCommand: celery -A config worker -l info --concurrency 2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          type: web
          name: notification-api
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: notification-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: notification-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: notification-redis
          property: connectionString
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: EMAIL_FROM
        sync: false

  - type: redis
    name: notification-redis
    plan: free
    maxmemoryPolicy: allkeys_lru
    ipAllowList: []

databases:
  - name: notification-db
    plan: free
